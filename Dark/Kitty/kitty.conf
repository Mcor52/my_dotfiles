# font_family "VictorMono Nerd Font Mono Medium"
# bold_font "VictorMono Nerd Font Mono Bold"
# italic_font "VictorMono Nerd Font Mono Medium Italic"
# bold_italic_font "VictorMono Nerd Font Mono Bold Italic"
font_size 14

background_opacity 0.4
dynamic_background_opacity yes

background #220b0a
foreground #d4be98

selection_background #e78a4e
selection_foreground #32302f

cursor #e78a4e
cursor_text_color #32302f

active_tab_background #e78a4e
active_tab_foreground #32302f
active_tab_font_style bold
inactive_tab_background #282828
inactive_tab_foreground #a89984
inactive_tab_font_style normal

# Black
color0 #32302f
color8 #928374

# Red
color1 #ea6962
color9 #ea6962

# Green
color2 #89b482
color10 #89b482

# Yellow
color3 #d8a657
color11 #d8a657

# Blue
color4 #667c99
color12 #667c99

# Magenta
color5 #d3869b
color13 #d3869b

# Cyan
color6 #7daea3
color14 #7daea3

# White
color7 #d4be98
color15 #d4be98

# BEGIN_KITTY_FONTS
font_family      family='Hack Nerd Font Mono' postscript_name=HackNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Some more personal tweaks
scrollback_lines 10000
hide_window_decorations yes
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
notify_on_cmd_finish invisible

cursor_trail 200
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# My keybindings that I like
map ctrl+shift+k scroll_page_up
map ctrl+shift+j scroll_page_down

map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
